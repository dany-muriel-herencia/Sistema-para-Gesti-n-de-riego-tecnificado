<!-- ========================================== -->
<!-- HIDRANTES - PÁGINA COMPLETA -->
<!-- ========================================== -->

<div class="panel">
    <div class="panel-header">
        <div class="title">
            <span class="material-symbols-outlined">water_damage</span>
            <h2>🚿 Gestión de Hidrantes</h2>
        </div>
        <span class="info-text" id="hidrantesStatus">0 disponibles</span>
    </div>
    <div class="panel-body">

        <!-- === FORMULARIO: AGREGAR HIDRANTE === -->
        <div class="form-card" style="
            background: var(--surface, #1a1a2e);
            border: 1px solid var(--border, #333);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: flex-end;
        ">
            <div style="display:flex; flex-direction:column; gap:4px; flex:1; min-width:150px;">
                <label for="h-nombre" style="font-size:0.75rem; color:var(--text-muted, #888); text-transform:uppercase; letter-spacing:.05em;">Nombre</label>
                <input
                    id="h-nombre"
                    type="text"
                    placeholder="Ej. Hidrante Norte"
                    maxlength="100"
                    style="
                        padding: 0.5rem 0.75rem;
                        background: var(--bg, #0d0d1a);
                        border: 1px solid var(--border, #333);
                        border-radius: 6px;
                        color: var(--text, #fff);
                        font-size: 0.9rem;
                        outline: none;
                    "
                />
            </div>

            <div style="display:flex; flex-direction:column; gap:4px; flex:0 0 110px;">
                <label for="h-capacidad" style="font-size:0.75rem; color:var(--text-muted, #888); text-transform:uppercase; letter-spacing:.05em;">Capacidad</label>
                <input
                    id="h-capacidad"
                    type="number"
                    min="1"
                    max="99"
                    value="1"
                    placeholder="1"
                    style="
                        padding: 0.5rem 0.75rem;
                        background: var(--bg, #0d0d1a);
                        border: 1px solid var(--border, #333);
                        border-radius: 6px;
                        color: var(--text, #fff);
                        font-size: 0.9rem;
                        outline: none;
                    "
                />
            </div>

            <div style="display:flex; flex-direction:column; gap:4px; flex:0 0 160px;">
                <label for="h-estado" style="font-size:0.75rem; color:var(--text-muted, #888); text-transform:uppercase; letter-spacing:.05em;">Estado</label>
                <select
                    id="h-estado"
                    style="
                        padding: 0.5rem 0.75rem;
                        background: var(--bg, #0d0d1a);
                        border: 1px solid var(--border, #333);
                        border-radius: 6px;
                        color: var(--text, #fff);
                        font-size: 0.9rem;
                        outline: none;
                        cursor: pointer;
                    "
                >
                    <option value="disponible">✅ Disponible</option>
                    <option value="en_uso">⚙️ En uso</option>
                    <option value="inactivo">🔴 Inactivo</option>
                </select>
            </div>

            <button
                id="btn-agregar-hidrante"
                onclick="submitAgregarHidrante()"
                style="
                    padding: 0.55rem 1.25rem;
                    background: linear-gradient(135deg, #00b4d8, #0077b6);
                    border: none;
                    border-radius: 6px;
                    color: #fff;
                    font-size: 0.9rem;
                    font-weight: 600;
                    cursor: pointer;
                    white-space: nowrap;
                    transition: opacity .2s, transform .1s;
                "
                onmouseover="this.style.opacity='0.85'"
                onmouseout="this.style.opacity='1'"
                onmousedown="this.style.transform='scale(0.97)'"
                onmouseup="this.style.transform='scale(1)'"
            >
                ➕ Agregar Hidrante
            </button>

            <span id="h-feedback" style="font-size:0.8rem; color:var(--text-muted, #888); align-self:center;"></span>
        </div>
        <!-- === FIN FORMULARIO === -->

        <div id="hidrantesContainer">
            <!-- Renderizado por JS -->
        </div>
    </div>
</div>

<script>
/**
 * Manejador del formulario de agregar hidrante.
 * Lee los campos del formulario y llama a agregarHidrante() de dashboard.js.
 */
async function submitAgregarHidrante() {
    const nombreEl    = document.getElementById('h-nombre');
    const capacidadEl = document.getElementById('h-capacidad');
    const estadoEl    = document.getElementById('h-estado');
    const feedback    = document.getElementById('h-feedback');
    const btn         = document.getElementById('btn-agregar-hidrante');

    const nombre    = nombreEl.value.trim();
    const capacidad = parseInt(capacidadEl.value);
    const estado    = estadoEl.value;

    // Validación local antes de llamar a la API
    if (!nombre) {
        feedback.textContent = '⚠️ El nombre es obligatorio.';
        feedback.style.color = '#f39c12';
        nombreEl.focus();
        return;
    }
    if (isNaN(capacidad) || capacidad < 1) {
        feedback.textContent = '⚠️ La capacidad debe ser >= 1.';
        feedback.style.color = '#f39c12';
        capacidadEl.focus();
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Guardando...';
    feedback.textContent = '';

    try {
        if (typeof agregarHidrante !== 'function') {
            throw new Error('agregarHidrante() no está disponible. Recarga la página.');
        }

        await agregarHidrante({ nombre, capacidad, estado });

        // Limpiar formulario
        nombreEl.value    = '';
        capacidadEl.value = '1';
        estadoEl.value    = 'disponible';
        feedback.textContent = '✅ Hidrante guardado correctamente.';
        feedback.style.color = '#2ecc71';

        // Limpiar feedback después de 3 segundos
        setTimeout(() => { feedback.textContent = ''; }, 3000);

    } catch (err) {
        feedback.textContent = `❌ ${err.message}`;
        feedback.style.color = '#e74c3c';
    } finally {
        btn.disabled    = false;
        btn.textContent = '➕ Agregar Hidrante';
    }
}
</script>
