<!-- ESTADÍSTICAS - PÁGINA COMPLETA -->
<!-- ========================================== -->

<div class="stats-grid">
    <div class="panel">
        <div class="panel-header">
            <div class="title">
                <span class="material-symbols-outlined">show_chart</span>
                <h2>📊 Distribución de Estrés</h2>
            </div>
        </div>
        <div class="panel-body">
            <div class="chart-bars">
                <div class="chart-bar">
                    <div class="bar critico" id="barCritico" style="height:0%;"></div>
                    <span class="label">🔴 <strong id="criticosLabel">0</strong></span>
                </div>
                <div class="chart-bar">
                    <div class="bar alerta" id="barAlerta" style="height:0%;"></div>
                    <span class="label">🟡 <strong id="alertasLabel">0</strong></span>
                </div>
                <div class="chart-bar">
                    <div class="bar optimo" id="barOptimo" style="height:0%;"></div>
                    <span class="label">🟢 <strong id="optimosLabel">0</strong></span>
                </div>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <div class="title">
                <span class="material-symbols-outlined">analytics</span>
                <h2>📈 Resumen</h2>
            </div>
        </div>
        <div class="panel-body">
            <div class="summary-list">
                <div class="summary-item">
                    <span class="key">💧 Humedad promedio</span>
                    <span class="value" id="humedadPromedio">0%</span>
                </div>
                <div class="summary-item">
                    <span class="key">🌡️ Temperatura promedio</span>
                    <span class="value" id="tempPromedioStat">0°C</span>
                </div>
                <div class="summary-item">
                    <span class="key">🚿 Hidrantes activos</span>
                    <span class="value" id="hidrantesActivos">0/0</span>
                </div>
                <div class="summary-item highlight">
                    <span class="key">🔴 Nivel de estrés</span>
                    <span class="value success" id="nivelEstres">✅ NORMAL</span>
                </div>
                <div class="summary-item">
                    <span class="key">🗄️ Base de datos</span>
                    <span class="value" id="dbStatusText">⏳ Conectando...</span>
                </div>
            </div>
        </div>
    </div>
</div>
